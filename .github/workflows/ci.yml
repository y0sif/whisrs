name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Linux (full build with all features) ─────────────────────────────────
  linux:
    name: Linux — Check, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libxkbcommon-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

  # ── Windows (build without local-whisper, no tray yet) ───────────────────
  windows:
    name: Windows — Build & Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build (no default features)
        run: cargo build --no-default-features

      - name: Test (no default features)
        run: cargo test --no-default-features

  # ── macOS (build without local-whisper, no tray yet) ─────────────────────
  macos:
    name: macOS — Build & Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build (no default features)
        run: cargo build --no-default-features

      - name: Test (no default features)
        run: cargo test --no-default-features
