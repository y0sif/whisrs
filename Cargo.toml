[package]
name = "whisrs"
version = "0.1.0"
edition = "2021"
description = "Linux-first voice-to-text dictation tool"
license = "MIT"

[[bin]]
name = "whisrs"
path = "src/cli/main.rs"

[[bin]]
name = "whisrsd"
path = "src/daemon/main.rs"

[features]
default = []
local = ["whisper-rs"]

[dependencies]
anyhow = "1"
arboard = "3"
async-trait = "0.1"
base64 = "0.22"
chrono = "0.4"
clap = { version = "4", features = ["derive"] }
cpal = "0.15"
dialoguer = "0.11"
dirs = "6"
evdev = "0.12"
futures-util = "0.3"
hound = "3"
libc = "0.2"
notify-rust = "4"
reqwest = { version = "0.12", features = ["multipart", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
strsim = "0.11"
swayipc = "3"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = { version = "0.26", features = ["native-tls"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
x11rb = "0.13"
xkbcommon = "0.8"
zbus = "5"

[dependencies.whisper-rs]
version = "0.15"
optional = true
